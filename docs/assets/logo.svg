<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="beam-in" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="prism-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="prism-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Incoming white beam -->
  <line x1="2" y1="58" x2="38" y2="58" stroke="url(#beam-in)" stroke-width="3" stroke-linecap="round"/>

  <!-- Prism triangle -->
  <polygon points="40,20 90,58 40,96" fill="url(#prism-face)" opacity="0.85"/>
  <polygon points="40,20 90,58 40,96" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Refracted spectrum beams -->
  <line x1="90" y1="58" x2="118" y2="28" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="58" x2="118" y2="38" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="58" x2="118" y2="48" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="58" x2="118" y2="58" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="58" x2="118" y2="68" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="58" x2="118" y2="78" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="58" x2="118" y2="88" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Subtle glow on prism -->
  <polygon points="40,20 90,58 40,96" fill="url(#prism-light)" opacity="0.4"/>

  <!-- Text -->
  <text x="60" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd" letter-spacing="3">PRISM</text>
</svg>
