version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "29123:8123"   # HTTP
      - "29000:9000"   # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      CLICKHOUSE_DB: prism
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: prism123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "prism123", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  collector:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.collector
    ports:
      - "24317:24317"   # gRPC
      - "24318:24318"   # Metrics HTTP
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - "-listen=:24317"
      - "-metrics=:24318"
      - "-clickhouse=clickhouse:9000"
      - "-ch-db=prism"
      - "-ch-pass=prism123"
      - "-redis=redis:6379"
      - "-flush-size=5000"

  query:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.query
    ports:
      - "28080:28080"   # HTTP API + Metrics
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - "-listen=:28080"
      - "-clickhouse=clickhouse:9000"
      - "-ch-db=prism"
      - "-ch-pass=prism123"

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "29090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - collector
      - query
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "23000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: prism
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  clickhouse_data:
  redis_data:
  prometheus_data:
  grafana_data:
